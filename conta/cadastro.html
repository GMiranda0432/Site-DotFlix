    <h3>Crie sua conta para acessar o formulário de cadastro de filmes</h3>
    <form action="#" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required><br>

        <label for="confirmar_senha">Confirmar Senha:</label>
        <input type="password" id="confirmar_senha" name="confirmar_senha" required><br>

        <input type="submit" value="Cadastrar">
    </form>
    <script>
        addEventListener('submit', (event) => {
            event.preventDefault();

            if (email.value !== "" && senha.value !== "" && nome.value !== "" && confirmar_senha.value !== "") {
                alert('Enviado com sucesso!');
            } else {
                alert('Erro no envio, há um erro no meu código :,]. Você não deveria ser capaz de receber essa mensagem');
            }
        });
    </script>
